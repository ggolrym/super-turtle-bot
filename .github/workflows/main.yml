name: 슈퍼 터틀 알림 봇

on:
  schedule:
    - cron: '0 0 * * 1-5' 
  workflow_dispatch: 

jobs:
  run-turtle-bot:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 창고에서 코드 가져오기
      uses: actions/checkout@v4  # v3에서 v4로 최신 업데이트!

    - name: 2. 파이썬 설치하기
      uses: actions/setup-python@v5 # v4에서 v5로 최신 업데이트!
      with:
        python-version: '3.10'

    - name: 3. 마법 도구 설치하기
      run: |
        pip install yfinance finance-datareader google-generativeai requests

    - name: 4. 로봇 실행!
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: python turtle_bot.py
